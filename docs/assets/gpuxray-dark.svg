<svg width="420" height="120" viewBox="0 0 420 120" xmlns="http://www.w3.org/2000/svg">

<!-- GPU card -->
<rect x="10" y="35" width="90" height="50" rx="6" fill="#9ca3af"></rect>

<!-- GPU fan -->
<circle cx="40" cy="60" r="14" fill="#22c55e"></circle>
<circle cx="40" cy="60" r="6" fill="#111827"></circle>

<!-- GPU connector -->
<rect x="100" y="55" width="10" height="10" fill="#22c55e"></rect>

<!-- Magnifying glass -->
<circle cx="85" cy="60" r="22" stroke="#22c55e" stroke-width="6" fill="none"></circle>
<line x1="100" y1="75" x2="120" y2="95" stroke="#22c55e" stroke-width="6" stroke-linecap="round"></line>

<!-- Chip -->
<rect x="74" y="49" width="22" height="22" rx="3" fill="#22c55e"></rect>

<!-- Text -->
<text x="140" y="70" font-family="-apple-system, Segoe UI, Helvetica, Arial" font-weight="700" font-size="36" fill="#e5e7eb">
GPU<tspan fill="#22c55e">XRAY</tspan>
</text>

</svg>