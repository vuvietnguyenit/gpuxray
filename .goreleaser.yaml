# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com

# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 1

before:
  hooks:
    - make vmlinux
    - make generate
    - go mod tidy

builds:
  - id: gpuxray
    main: .
    binary: gpuxray
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64

archives:
  - format: tar.gz
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        format: zip


dockers:
  - image_templates:
      - "vuvietnguyenit/gpuxray:{{ .Tag }}-amd64"
      - "vuvietnguyenit/gpuxray:latest-amd64"
    dockerfile: Dockerfile
    goos: linux
    goarch: amd64
    use: buildx


docker_manifests:
  - name_template: vuvietnguyenit/gpuxray:{{ .Tag }}
    image_templates:
      - vuvietnguyenit/gpuxray:{{ .Tag }}-amd64
      - vuvietnguyenit/gpuxray:{{ .Tag }}-arm64

  - name_template: vuvietnguyenit/gpuxray:latest
    image_templates:
      - vuvietnguyenit/gpuxray:latest-amd64
      - vuvietnguyenit/gpuxray:latest-arm64

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
